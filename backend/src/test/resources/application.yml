spring:
  profiles:
    active: test
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: false
  datasource:
    url: jdbc:h2:mem:nova;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ""
  flyway:
    enabled: false

nova:
  cors:
    allowed-origins: "*"
    allowed-methods: GET,POST,PUT,PATCH,DELETE,OPTIONS
    allowed-headers: "*"
    allow-credentials: false
  jwt:
    secret: test-jwt-secret-key-that-is-long-enough-for-hs256-0123456789
    access-token-minutes: 15
    refresh-token-days: 30

logging:
  level:
    com.nova: INFO
