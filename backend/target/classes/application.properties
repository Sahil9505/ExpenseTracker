# ============================
# Application Configuration
# ============================
spring.application.name=expense-tracker-backend

# Server Port
server.port=8080

# ============================
# MySQL Database Configuration
# ============================
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================
# JPA / Hibernate Configuration
# ============================
# update = auto creates/updates tables based on entity classes
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# ============================
# JWT Configuration
# ============================
# Secret key for signing JWT tokens (keep this private!)
jwt.secret=mySecretKeyForExpenseTrackerProjectThatIsLongEnough123456
# Token expires in 24 hours (in milliseconds)
jwt.expiration=86400000

# ============================
# CORS Configuration
# ============================
# Allow requests from our React frontend
app.cors.allowed-origins=http://localhost:5173,http://127.0.0.1:5173
